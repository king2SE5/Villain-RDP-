name: RDP

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 350

    steps:
      - name: Configure Core RDP Settings
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                           -Name "fDenyTSConnections" -Value 0 -Force

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                           -Name "UserAuthentication" -Value 0 -Force

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                           -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          Set-Service -Name TermService -StartupType Automatic
          try {
            Restart-Service -Name TermService -Force -ErrorAction Stop
            Write-Host "TermService restarted successfully."
          } catch {
            Start-Service -Name TermService -ErrorAction SilentlyContinue
            Write-Host "TermService started."
          }

          Write-Host "RDP configuration completed."

      - name: Create RDP User
        shell: powershell
        run: |
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126))
          }

          $rawPassword = @()
          $rawPassword += $charSet.Upper   | Get-Random -Count 4
          $rawPassword += $charSet.Lower   | Get-Random -Count 4
          $rawPassword += $charSet.Number  | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })

          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name "RDP"
              Write-Host "Old RDP user removed."
          }

          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators"       -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

          Write-Host "RDP user created successfully."

      - name: Install Tailscale
        shell: powershell
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"

          Write-Host "Downloading Tailscale..."
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath -UseBasicParsing

          Write-Host "Installing Tailscale..."
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait

          Remove-Item $installerPath -Force
          Write-Host "Tailscale installed successfully."

      - name: Connect Tailscale
        shell: powershell
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
              --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
              --hostname=gh-runner-$env:GITHUB_RUN_ID

          $tsIP = $null
          $retries = 0

          while (-not $tsIP -and $retries -lt 20) {
              Start-Sleep -Seconds 5
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>$null
              $retries++
              Write-Host "Attempt $retries - IP: $tsIP"
          }

          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned. Exiting."
              exit 1
          }

          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "Tailscale connected. IP: $tsIP"

      - name: Verify RDP Port
        shell: powershell
        run: |
          Write-Host "Testing RDP on: $env:TAILSCALE_IP"

          $retries = 0
          $success = $false

          while (-not $success -and $retries -lt 10) {
              $test = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 -WarningAction SilentlyContinue
              if ($test.TcpTestSucceeded) {
                  $success = $true
              } else {
                  $retries++
                  Write-Host "Attempt $retries failed. Retrying in 5s..."
                  Start-Sleep -Seconds 5
              }
          }

          if (-not $success) {
              Write-Error "RDP port 3389 not accessible after $retries attempts."
              exit 1
          }

          Write-Host "RDP port 3389 is accessible!"

      - name: Show Credentials & Keep Alive
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "================================"
          Write-Host "=== RDP ACCESS INFORMATION ==="
          Write-Host "================================"
          Write-Host "  Address  : $env:TAILSCALE_IP"
          Write-Host "  Username : RDP"
          Write-Host "  Password : $env:RDP_PASSWORD"
          Write-Host "  Port     : 3389"
          Write-Host "================================"
          Write-Host ""

          $end = (Get-Date).AddMinutes(330)
          $counter = 0

          while ((Get-Date) -lt $end) {
              $counter++
              $remaining = [math]::Round(($end - (Get-Date)).TotalMinutes, 1)
              Write-Host "[$counter] $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') | Remaining: $remaining min | IP: $env:TAILSCALE_IP"
              Start-Sleep -Seconds 60
          }

          Write-Host "Session ending. Auto-restart will trigger shortly via schedule."
