name: Debug Windows Runner (RDP)

on:
  workflow_dispatch:

jobs:
  debug-rdp:
    name: Tailscale RDP Debug Session
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Configure Core RDP Settings
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          
          Set-Service -Name TermService -StartupType Automatic
          Restart-Service -Name TermService -Force -ErrorAction SilentlyContinue

      - name: Create RDP User with Secure Password
        shell: powershell
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = [char[]](33..47) + [char[]](58..64)
          }
          
          $rawPassword = ($charSet.Upper | Get-Random -Count 4) + ($charSet.Lower | Get-Random -Count 4) + ($charSet.Number | Get-Random -Count 4) + ($charSet.Special | Get-Random -Count 4)
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          $username = "RDPUser"

          # Remove existing user if present to avoid conflicts
          if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name $username
              Write-Host "Existing user $username removed."
          }

          New-LocalUser -Name $username -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username
          
          # Masking line removed so password prints to the log clearly
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install and Connect Tailscale
        shell: powershell
        run: |
          $authKey = "${{ secrets.TAILSCALE_AUTH_KEY }}"
          if ([string]::IsNullOrEmpty($authKey)) {
              Write-Error "ERROR: TAILSCALE_AUTH_KEY secret is missing!"
              exit 1
          }

          Write-Host "Downloading Tailscale..."
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" -OutFile "$env:TEMP\tailscale.msi" -UseBasicParsing
          
          Write-Host "Installing Tailscale..."
          Start-Process msiexec.exe -ArgumentList "/i", "`"$env:TEMP\tailscale.msi`"", "/quiet", "/norestart" -Wait
          
          Write-Host "Connecting to Tailscale network..."
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$authKey --hostname=gh-runner-$env:GITHUB_RUN_ID
          
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 12) {
              Start-Sleep -Seconds 5
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>$null
              $retries++
              Write-Host "Waiting for IP... (Attempt $retries)"
          }

          if (-not $tsIP) {
              Write-Error "Failed to obtain a Tailscale IP address."
              exit 1
          }

          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Output Connection Details
        shell: powershell
        run: |
          Write-Host "========================================"
          Write-Host "=== RDP DEBUG SESSION ESTABLISHED ==="
          Write-Host "========================================"
          Write-Host "  Tailscale IP : $env:TAILSCALE_IP"
          Write-Host "  Username     : RDPUser"
          Write-Host "  Password     : $env:RDP_PASSWORD"
          Write-Host "========================================"
          Write-Host "Session will automatically close in 60 minutes."

      - name: Maintain Debug Window
        shell: powershell
        run: |
          Start-Sleep -Seconds 3600
          
